name: Data Refresh - Mutual Fund FAQ Knowledge Base

on:
  schedule:
    # Run every Monday at 2:00 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

jobs:
  refresh-knowledge-base:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 sentence-transformers numpy chromadb

      - name: Phase 0 - Health Check
        id: health_check
        run: |
          cd src/phase0_config
          python health_check.py
        continue-on-error: true

      - name: Create Issue on Health Check Failure
        if: steps.health_check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Data Refresh Failed - URL Health Check',
              body: 'One or more target Groww URLs failed the health check during the scheduled data refresh. Please investigate and update URLs in `src/phase0_config/config.json` if needed.',
              labels: ['bug', 'data-refresh']
            });

      - name: Abort on Health Check Failure
        if: steps.health_check.outcome == 'failure'
        run: |
          echo "Health check failed. Aborting data refresh to prevent corrupt data."
          exit 1

      - name: Phase 1.1 - Scrape URLs
        run: |
          cd src/phase1_ingestion/phase1_1_scraping
          python scraper.py

      - name: Phase 1.2 - Parse & Clean HTML
        run: |
          cd src/phase1_ingestion/phase1_2_parsing
          python parser.py

      - name: Phase 1.3 - Chunk Text
        run: |
          cd src/phase1_ingestion/phase1_3_chunking
          python chunker.py

      - name: Phase 1.5 - BGE Embedding
        run: |
          cd src/phase1_ingestion/phase1_5_embedding_bge
          python embedder_bge.py

      - name: Phase 1.6 - ChromaDB Ingest
        run: |
          cd src/phase1_ingestion/phase1_6_chromadb
          python chroma_ingest.py

      - name: Check for Changes
        id: check_changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in the knowledge base."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected! Preparing to commit."
          fi

      - name: Commit & Push Updated Index
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh knowledge base data [automated]"
          git push
